# /etc/logrotate.d/kyro
#
# Log rotation for Kyro's PM2 process logs and the nightly Docker cleanup log.
#
# Install:  sudo bash scripts/free-tier/install-logrotate.sh
# Test:     sudo logrotate -d /etc/logrotate.d/kyro   (dry-run)
# Force:    sudo logrotate -f /etc/logrotate.d/kyro   (immediate rotate)
#
# WHY this matters on Free Tier:
#   PM2 writes a separate log file per process (kyro-web, kyro-worker, kyro-proxy)
#   with no built-in size limit. On a 20 GB disk with active deploys, each file
#   can grow hundreds of MB within days. logrotate keeps the last 7 daily
#   snapshots (compressed) and truncates the live file — PM2's `copytruncate`
#   option means the running process never needs to reopen the file.

# PM2 log directory — adjust the path if $HOME differs from /home/ubuntu
/home/ubuntu/.pm2/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    # copytruncate: copy the log, then truncate the original in place.
    # This is safe for PM2 because the process holds the file descriptor open;
    # we don't need to send a signal to reopen it.
    copytruncate
    dateext
    dateformat -%Y%m%d
}

# Docker cleanup script log (written by the nightly cron)
/var/log/kyro-docker-cleanup.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}
