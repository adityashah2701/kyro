# Base service definitions — image, environment, and volumes only.
#
# This file intentionally defines NO ports, NO restart policies, and NO
# memory limits. Those are all environment-specific and are owned entirely
# by the overlay that is stacked on top of this file.
#
# WHY ports are not here:
#   Docker Compose MERGES lists — it does not replace them. If ports are
#   defined in the base file AND in an overlay, the merged result contains
#   BOTH sets of bindings, causing "address already in use" errors because
#   two port-proxy rules claim the same published port. By owning ports
#   exclusively in each overlay, there is nothing to merge and the bug is
#   structurally impossible.
#
# Usage:
#   Local dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Free Tier:  docker compose -f docker-compose.yml -f docker-compose.freetier.yml up -d
#
# See docker-compose.dev.yml and docker-compose.freetier.yml for the
# environment-specific port bindings, memory limits, and restart policies.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kyro
      POSTGRES_PASSWORD: kyro_password
      POSTGRES_DB: kyro
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: kyro_admin
      MINIO_ROOT_PASSWORD: kyro_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
