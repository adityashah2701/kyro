# Free-Tier production overlay — stacked on top of docker-compose.yml.
#
# Target host: AWS t2.micro / t3.micro — 1 vCPU, 1 GB RAM, ~20 GB EBS.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.freetier.yml up -d
#
# WHY ports are safe here (no duplication):
#   docker-compose.yml defines NO ports at all, so Docker Compose has nothing
#   to merge/append. This overlay is the sole owner of every port binding.
#   The result is exactly one published port per service in the merged config.
#   (Previously the base file defined ports AND this overlay redefined them,
#   causing Docker Compose to append both sets → duplicate published ports →
#   "bind: address already in use" on container start.)
#
# Security:
#   All ports are bound to 127.0.0.1 — accessible only from the host itself.
#   The reverse proxy (Caddy / nginx) and PM2 processes talk to services via
#   localhost. Nothing is reachable from the public internet on these ports.
#
# Restart policy:
#   restart: unless-stopped ensures containers come back automatically after
#   an instance reboot (Free Tier instances reboot during maintenance windows).

services:
  postgres:
    restart: unless-stopped
    # Bind to loopback only — not exposed to the public internet.
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 256m
    # Shrink Postgres' memory appetite for a tiny box.
    # Replaces the default postgres entrypoint args — safe because the base
    # docker-compose.yml specifies no `command` for postgres.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "effective_cache_size=128MB"

  redis:
    restart: unless-stopped
    # Bind to loopback only.
    ports:
      - "127.0.0.1:6379:6379"
    mem_limit: 96m
    # WHY allkeys-lru (not noeviction):
    #   noeviction causes Redis to *error* on new writes when the memory
    #   ceiling is hit — BullMQ would fail to enqueue jobs. allkeys-lru
    #   instead evicts the coldest keys, keeping the service alive. BullMQ
    #   job data is small (~1–2 KB each) so 64 MB holds thousands of jobs
    #   before any eviction occurs; in practice eviction never happens.
    #
    # WHY no persistence (--save "" --appendonly no):
    #   Job queue state is reconstructed from Postgres on worker restart.
    #   Disabling AOF and RDB removes fsync overhead and avoids filling the
    #   small EBS volume with write-ahead logs.
    #
    # NOTE: this command REPLACES (not appends to) the base image's default
    # entrypoint args because docker-compose.yml sets no `command` for redis.
    # Docker Compose merges `command` as a whole value, not element-by-element,
    # so the override is safe.
    command:
      - "redis-server"
      - "--maxmemory"
      - "64mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--appendonly"
      - "no"

  minio:
    restart: unless-stopped
    # Bind BOTH ports to loopback only.
    ports:
      - "127.0.0.1:9000:9000"    # S3 API
      - "127.0.0.1:9001:9001"    # Web console
    mem_limit: 256m
